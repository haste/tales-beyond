name: Release
on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 0.24.0)
        required: true
        type: string
jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version-file: ".tool-versions"
      - name: Install dependencies
        run: bun install
      - name: Run build
        run: bun run build
      - name: Run checks
        run: bun run check
      - name: Run tests
        run: bun test

  release-firefox:
    runs-on: ubuntu-latest
    needs: check
    environment: firefox
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version-file: ".tool-versions"
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build:firefox
      - name: Package source
        run: bun run package:source
      - name: Release Firefox
        env:
          VERSION: ${{ needs.check.outputs.version }}
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_SECRET: ${{ secrets.AMO_SECRET }}
        run: |
          bun changelog:amo > amo.json

          bun web-ext sign \
            -s build/firefox/ \
            --channel listed \
            --amo-metadata amo.json \
            --upload-source-code tales-beyond-source-${VERSION}.zip \
            --api-key ${AMO_API_KEY} \
            --api-secret ${AMO_SECRET}
      - name: Add xpi to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: web-ext-artifacts/*.xpi

  release-chrome:
    runs-on: ubuntu-latest
    needs: check
    environment: chrome
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version-file: ".tool-versions"
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build:chrome
      - name: Package Chrome
        run: bun run package:chrome
      - name: Release Chrome
        env:
          VERSION: ${{ needs.check.outputs.version }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          bunx chrome-webstore-upload-cli@3 \
            --source web-ext-artifacts/tales_beyond-${VERSION}.zip \
            --extension-id ${CWS_EXTENSION_ID} \
            --client-id ${CWS_CLIENT_ID} \
            --client-secret ${CWS_CLIENT_SECRET} \
            --refresh-token ${CWS_REFRESH_TOKEN}

  release-symbiote:
    runs-on: ubuntu-latest
    needs: check
    environment: symbiote
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version-file: ".tool-versions"
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build:symbiote
      - name: Package Symbiote
        run: bun run package:symbiote
      - name: Release Symbiote
        env:
          VERSION: ${{ needs.check.outputs.version }}
          MODIO_API_URL: ${{ secrets.MODIO_API_URL }}
          MODIO_API_TOKEN: ${{ secrets.MODIO_API_TOKEN }}
        run: |
          curl -X POST ${MODIO_API_URL}/games/3963/mods/4389946/files \
            --silent --output /dev/null --show-error --fail \
            -H "Authorization: Bearer ${MODIO_API_TOKEN}" \
            -H 'Content-Type: multipart/form-data' \
            -H 'Accept: application/json' \
            -F "filedata=@web-ext-artifacts/tales-beyond-symbiote-${VERSION}.zip" \
            -F "version=${VERSION}" \
            -F "changelog=$(bun changelog:modio)" \
            -F 'active=true' \
            -F "filehash=$(md5sum web-ext-artifacts/tales-beyond-symbiote-${VERSION}.zip | cut -c -32)"

  release-github:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version-file: ".tool-versions"
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build
      - name: Package
        run: bun run package
      - name: Add artifacts
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: web-ext-artifacts/*
